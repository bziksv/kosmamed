# =============================================================================
# kosmamed.ru / medmarket.su — ПОЛНЫЙ конфиг BACKEND (Apache mod_fcgid)
#
# FastPanel:
#   /etc/apache2/fastpanel2-sites/medmarket_su_usr/medmarket.su.conf
#   (или «Сайты → Apache» в панели)
#
# После правок:
#   apache2ctl configtest && systemctl reload apache2
# =============================================================================

<Directory /var/www/medmarket_su_usr/data/www/medmarket.su>
    Options +ExecCGI -Indexes
    AllowOverride All
    FcgidWrapper "/var/www/medmarket_su_usr/data/php-bin/medmarket.su/php"
</Directory>

<VirtualHost 127.0.0.1:81>
    ServerName medmarket.su
    ServerAlias medmarket.su www.medmarket.su kosmamed.ru www.kosmamed.ru
    ServerAdmin admin@medmarket.su

    DocumentRoot "/var/www/medmarket_su_usr/data/www/medmarket.su"
    DirectoryIndex index.php index.html

    SuexecUserGroup medmarket_su_usr medmarket_su_usr

    CustomLog /var/www/medmarket_su_usr/data/logs/medmarket.su-backend.access.log combined
    ErrorLog /var/www/medmarket_su_usr/data/logs/medmarket.su-backend.error.log

    <FilesMatch "\.ph(p[3-5]?|tml)$">
        SetHandler fcgid-script
    </FilesMatch>

    <IfModule mod_env.c>
        SetEnv SERVICE_HOST 127.0.0.1
        SetEnv SERVICE_PORT 3202
    </IfModule>

    <IfModule mod_fcgid.c>
        FcgidInitialEnv SERVICE_HOST 127.0.0.1
        FcgidInitialEnv SERVICE_PORT 3202
        # Не держать зависшие PHP 2.5 часа (дефолт FcgidBusyTimeout=9600)
        FcgidIOTimeout 600
        FcgidBusyTimeout 600
        FcgidIdleTimeout 300
    </IfModule>

    # KeepAlive — меньше overhead nginx → Apache
    KeepAlive On
    MaxKeepAliveRequests 500
    KeepAliveTimeout 5

    AddDefaultCharset UTF-8
    SetEnvIf Authorization .+ HTTP_AUTHORIZATION=$0
</VirtualHost>
