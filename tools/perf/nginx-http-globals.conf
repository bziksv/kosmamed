# =============================================================================
# kosmamed.ru / medmarket.su — блоки для http { } (nginx frontend)
#
# FastPanel: /etc/nginx/conf.d/kosmamed-performance-http.conf
# (или вручную вставить в /etc/nginx/nginx.conf внутрь http { })
#
# После правок:
#   nginx -t && systemctl reload nginx
#
# Не дублировать limit_req_zone / map, если уже есть в nginx.conf.
# =============================================================================

# --- WebP: суффикс для try_files (см. nginx-kosmamed-performance.include.conf) ---
map $http_accept $webp_suffix {
    default        "";
    "~*image/webp" ".webp";
}

# --- GEO: исключения из rate limit (офис, VPN, мониторинг) ---
geo $limit {
    default 1;
    217.25.226.46 0;
    185.23.82.233 0;
    155.212.171.103 0;
    # Добавьте свои IP при необходимости
}

# Подсети поисковиков (для whitelist ботов в server { })
geo $search_engine {
    default 0;
    77.88.0.0/18 1;
    5.45.192.0/18 1;
    213.180.193.0/24 1;
    66.249.64.0/19 1;
    64.233.160.0/19 1;
}

map $limit $limit_key {
    0 "";
    1 $binary_remote_addr;
}

limit_conn_zone $limit_key zone=conn_per_ip:10m;
limit_req_zone $limit_key zone=one:200m rate=1000r/m;
limit_req_zone $limit_key zone=kosmamed:100m rate=300r/m;

# --- GZIP (глобально; в server можно не дублировать) ---
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml
    image/x-icon;

# --- Кеш открытых файлов (статика с диска, без Apache) ---
open_file_cache max=10000 inactive=60s;
open_file_cache_valid 120s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

# brotli (если установлен ngx_brotli — раскомментировать):
# brotli on;
# brotli_comp_level 5;
# brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
