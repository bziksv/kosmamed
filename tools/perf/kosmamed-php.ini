; =============================================================================
; kosmamed.ru / medmarket.su — php.ini для FastPanel (mod_fcgid / php-cgi)
;
; Путь на сервере:
;   /var/www/medmarket_su_usr/data/php-bin/medmarket.su/php.ini
;   (или «PHP → Дополнительные директивы» в FastPanel)
;
; Проверка: Bitrix → Настройки → PHP (phpinfo), не php -i в CLI.
;
; После правок:
;   apache2ctl configtest && systemctl reload apache2
;
; validate_timestamps=0 → после git-деплоя ОБЯЗАТЕЛЬНО reload apache2.
; Локально (php -S :8083) opcache держать ВЫКЛЮЧЕННЫМ.
; =============================================================================

; priority=99
max_input_vars=10000
post_max_size=500M
upload_max_filesize=500M
max_input_time=300
max_execution_time=300
memory_limit=512M
default_socket_timeout=120

short_open_tag=On
display_errors=Off
log_errors=On
output_buffering=4096
date.timezone=Europe/Moscow

upload_tmp_dir=/var/www/medmarket_su_usr/data/tmp
session.save_path=/var/www/medmarket_su_usr/data/tmp

sendmail_path=/usr/sbin/sendmail -t -i -f 'admin@medmarket.su'
mail.add_x_header=On

; --- OPcache (prod) ---
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=100000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments=1
opcache.blacklist_filename=/opt/opcache-blacklists/opcache-*.blacklist

; --- realpath cache (много include в Bitrix) ---
realpath_cache_size=4096K
realpath_cache_ttl=600

; memory_limit: на проде было 2048M — для выгрузок поднять при OOM.
; Для витрины 512M; при падении export/MoySklad → 1024M или 2048M.
memory_limit=512M
