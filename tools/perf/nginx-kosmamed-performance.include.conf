# =============================================================================
# kosmamed.ru / medmarket.su — performance + security include для server { }
#
# На сервере:
#   /etc/nginx/fastpanel2-sites/medmarket_su_usr/medmarket.su.performance.conf
#
# В /etc/nginx/fastpanel2-sites/medmarket_su_usr/medmarket.su.includes добавить
# ПЕРЕД location / :
#   include /etc/nginx/fastpanel2-sites/medmarket_su_usr/medmarket.su.performance.conf;
#
# Требует map $webp_suffix в http { } — см. nginx-http-globals.conf
# =============================================================================

# --- Security: PHP в upload и типичные сканеры ---
location ~* ^/upload/.*\.php$ {
    return 403;
}
location ~* "^/[0-9a-f]{8,}(index)?\.php$" {
    return 403;
}
location ~* ^/(\.env|\.git|wp-admin|wp-config|\.aws|actuator)(/|$) {
    return 444;
}

# --- Bitrix: собранные CSS/JS (immutable, без Apache) ---
location ~* ^/bitrix/cache/(css|js)/ {
    limit_conn conn_per_ip 150;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

# --- Bitrix: JS/CSS шаблона и ядра ---
location ~* ^/bitrix/(js|templates)/.+\.(css|js)$ {
    limit_conn conn_per_ip 150;
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
}

# --- Upload: WebP по Accept + долгий кэш (без PHP) ---
location ~* ^/upload/.+\.(?:png|jpe?g)$ {
    limit_conn conn_per_ip 150;
    access_log off;
    add_header Vary Accept;
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri$webp_suffix $uri =404;
}

location ^~ /upload/ {
    location ~ \.php$ {
        return 403;
    }
    limit_conn conn_per_ip 150;
    access_log off;
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
}
