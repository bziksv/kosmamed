# =============================================================================
# kosmamed.ru / medmarket.su — frontend server { } (nginx → Apache :81)
#
# Куда: /etc/nginx/fastpanel2-sites/medmarket_su_usr/medmarket.su.conf
#
# Самодостаточный vhost: без map/limit_req_zone из http { }.
# Опционально (rate limit + WebP map): nginx-http-globals.conf → conf.d/
#
# !!! SSL: пути сертификатов — сверить с FastPanel !!!
#
#   nginx -t && systemctl reload nginx
# =============================================================================

server {
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 600s;
    send_timeout 300s;
    fastcgi_send_timeout 600s;
    fastcgi_read_timeout 600s;

    client_body_timeout 100s;
    client_header_timeout 100s;
    client_max_body_size 520m;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    server_name medmarket.su www.medmarket.su kosmamed.ru www.kosmamed.ru;

    listen 155.212.171.103:80;
    listen 155.212.171.103:443 ssl;
    http2 on;

    ssl_certificate "/var/www/httpd-cert/medmarket.su_2026-06-29-22-44_10.crt";
    ssl_certificate_key "/var/www/httpd-cert/medmarket.su_2026-06-29-22-44_10.key";

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml
        image/x-icon;

    set $root_path /var/www/medmarket_su_usr/data/www/medmarket.su;
    root $root_path;
    disable_symlinks if_not_owner from=$root_path;

    # --- Security ---
    location ~* ^/upload/.*\.php$ {
        return 403;
    }
    location ~* "^/[0-9a-f]{8,}(index)?\.php$" {
        return 403;
    }
    location ~* ^/(\.env|\.git|wp-admin|wp-config|\.aws|actuator)(/|$) {
        return 444;
    }

    # --- Bitrix static (с диска nginx, без Apache) ---
    location ~* ^/bitrix/cache/(css|js)/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* ^/bitrix/(js|templates)/.+\.(css|js)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ^~ /upload/ {
        location ~ \.php$ {
            return 403;
        }
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # --- Долгие выгрузки Bitrix (Yandex, CSV, MoySklad) ---
    location ~* ^/bitrix/(catalog_export|php_interface/include)/ {
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_pass http://127.0.0.1:81;
        proxy_redirect http://127.0.0.1:81/ /;
        include /etc/nginx/proxy_params;
    }

    # --- Каталог и карточки товара ---
    location ~* ^/(catalog|product)/ {
        set $bot_request 0;
        if ($http_user_agent ~* "(bot|crawl|spider|scraper|python|curl|wget|httpclient|masscan|zgrab)") {
            set $bot_request 1;
        }
        if ($http_user_agent ~* "(Google|Yandex|Screaming)[A-Za-z\-]*(Bot|bot|Preview|Image|Video|Media|News|Direct|Market|Metrika|Catalog|Accessibility|Mobile|Screenshot|Antivirus|Vertis|ForDomain|SearchShop|Favicons|Webmaster|Pagechecker|Calendar|Sitelinks|Blogs)") {
            set $bot_request 0;
        }
        if ($http_user_agent ~* "(kosmamed-warmup|kosmamed-psi|vilmed-warmup)") {
            set $bot_request 0;
        }
        if ($bot_request = 1) {
            return 444;
        }

        proxy_pass http://127.0.0.1:81;
        proxy_redirect http://127.0.0.1:81/ /;
        include /etc/nginx/proxy_params;
    }

    # --- Прочая статика ---
    location ~* \.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpeg|avi|zip|gz|bz2|rar|swf|ico|7z|doc|docx|map|otf|pdf|ttf|tif|txt|wav|webp|woff|woff2|xls|xlsx|xml)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ @fallback;
    }

    # --- HTML, ajax, personal ---
    location / {
        set $bot_request 0;
        if ($http_user_agent ~* "(bot|crawl|spider|scraper|python|curl|wget|httpclient|masscan|zgrab)") {
            set $bot_request 1;
        }
        if ($http_user_agent ~* "(Google|Yandex|Screaming)[A-Za-z\-]*(Bot|bot|Preview|Image|Video|Media|News|Direct|Market|Metrika|Catalog|Accessibility|Mobile|Screenshot|Antivirus|Vertis|ForDomain|SearchShop|Favicons|Webmaster|Pagechecker|Calendar|Sitelinks|Blogs)") {
            set $bot_request 0;
        }
        if ($http_user_agent ~* "(kosmamed-warmup|kosmamed-psi|vilmed-warmup)") {
            set $bot_request 0;
        }
        if ($bot_request = 1) {
            return 444;
        }

        proxy_pass http://127.0.0.1:81;
        proxy_redirect http://127.0.0.1:81/ /;
        include /etc/nginx/proxy_params;
    }

    location @fallback {
        proxy_pass http://127.0.0.1:81;
        proxy_redirect http://127.0.0.1:81/ /;
        include /etc/nginx/proxy_params;
    }

    include "/etc/nginx/fastpanel2-sites/medmarket_su_usr/medmarket.su.includes";
    include /etc/nginx/fastpanel2-includes/*.conf;

    error_log /var/www/medmarket_su_usr/data/logs/medmarket.su-frontend.error.log;
    access_log /var/www/medmarket_su_usr/data/logs/medmarket.su-frontend.access.log;
}
